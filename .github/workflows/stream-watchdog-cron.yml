name: STREAM watchdog (cron)

# Last-line guarantee that the STREAM/ handoff loop keeps moving even when
# every interactive AI client (Claude Code, Codex CLI, KiloCode, etc.) is
# offline. Runs every 15 minutes via cron on the default branch.
#
# Jobs:
#   1. validate    — schema-check every message in CLAUDE_INBOX/CODEX_INBOX/LEDGER
#   2. watchdog    — detect STUCK correlations + EXPIRED messages
#   3. archive     — move resolved/expired messages to LEDGER.md after 6h
#   4. snapshot    — refresh a STATE.md snapshot built from gh PR state
#
# Foolproofing:
#   - Idempotent (running twice produces the same state)
#   - Read-only on PR data; only writes back to STREAM/ markdown
#   - Posts a chip-comment on the most recently-active PR if loop is WEDGED
#   - Files an issue if circuit-breaker fires (prevents silent drift)

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: stream-watchdog
  cancel-in-progress: false   # don't cancel a running watchdog with another one

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate STREAM/ schema
        id: validate
        run: node scripts/stream-validate.mjs

      - name: Run watchdog (heartbeat + auto-reassign)
        id: watchdog
        run: |
          set +e
          node scripts/stream-watchdog.mjs
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Fail on watchdog runtime error
        if: steps.watchdog.outputs.exit_code != '0' && steps.watchdog.outputs.exit_code != '2'
        run: |
          echo "watchdog exited with unexpected code ${{ steps.watchdog.outputs.exit_code }}"
          exit 1

      - name: Archive resolved/expired messages
        id: archive
        run: node scripts/stream-archive.mjs

      - name: Refresh state snapshot
        id: snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Best-effort STATE.md refresh from gh PR data; if the script
          # doesn't exist yet (PR pending), do nothing rather than fail.
          if [ -f scripts/stream-state-snapshot.mjs ]; then
            node scripts/stream-state-snapshot.mjs
          else
            echo "stream-state-snapshot.mjs not present; skipping"
          fi

      - name: Validate STREAM/ schema after mutation
        if: steps.watchdog.outputs.exit_code == '0'
        run: node scripts/stream-validate.mjs

      - name: Commit STREAM/ changes (if any)
        id: commit_stream
        if: steps.watchdog.outputs.exit_code == '0' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_BRANCH: stream/watchdog-auto-update
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "not on main; refusing to push STREAM changes"
            exit 1
          fi
          git fetch origin "${AUTO_BRANCH}:refs/remotes/origin/${AUTO_BRANCH}" || true
          git config user.name "stream-watchdog[bot]"
          git config user.email "stream-watchdog@noreply.github.com"
          git add handoffs/STREAM/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no STREAM changes; nothing to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git checkout -B "${AUTO_BRANCH}"
          git commit -m "chore(stream): watchdog auto-update"
          git push --force-with-lease=refs/heads/${AUTO_BRANCH} origin HEAD:refs/heads/${AUTO_BRANCH}
          existing=$(gh pr list --head "${AUTO_BRANCH}" --base main --state open --json number --jq '.[0].number // ""')
          if [ -z "$existing" ]; then
            gh pr create \
              --head "${AUTO_BRANCH}" \
              --base main \
              --title "chore(stream): watchdog auto-update" \
              --body "Automated STREAM watchdog update. This PR is generated by the cron workflow instead of pushing directly to main."
          else
            gh pr comment "$existing" --body "STREAM watchdog pushed a fresh auto-update commit."
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Open circuit-breaker issue if wedged
        if: steps.watchdog.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Watchdog exits 2 when WEDGED. Don't spam — only open if there
          # isn't already an open one with the same title.
          TITLE='[STREAM watchdog] loop is wedged — needs attention'
          existing=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number // ""')
          if [ -z "$existing" ]; then
            gh issue create \
              --title "$TITLE" \
              --body "The STREAM watchdog detected a wedged loop (>10 open messages + no LEDGER append in 60 min). Check handoffs/STREAM/STATE.md and the latest CLAUDE_INBOX/CODEX_INBOX entries. Auto-reassign messages have been posted; if no client picks them up within 30 min the loop is stalled." \
              --label "stream-watchdog,priority-p0" || true
          else
            echo "circuit-breaker issue #$existing already open; not creating duplicate"
          fi

      - name: Fail on wedged STREAM loop
        if: steps.watchdog.outputs.exit_code == '2'
        run: |
          echo "STREAM watchdog reported a wedged loop."
          exit 2
