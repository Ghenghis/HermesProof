name: Truth Gates

# Runs the orchestrator's full truth-gate harness in CI.
# Skips local-machine gates (Claude/Codex/Windsurf config presence,
# Hermes3D workspace integrity) which are inherently host-specific;
# everything else — source manifest, deps parity, unit tests, MCP stdio
# handshake, and the end-to-end multi-agent flow — runs against a fresh
# git-initialized sandbox the harness creates internally.
#
# On every successful push to main, the resulting PROOF/latest.json
# and PROOF_E2E_REPORT.md are committed back to the repo so the latest
# attestation lives at HEAD. CI loop is broken via [skip ci].

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  truth-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Need full history so the bot commit can land cleanly.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN with write perms (granted above).
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run truth gates (CI mode)
        run: node scripts/truth-gates.mjs --ci

      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: proof-${{ github.sha }}
          path: |
            PROOF/latest.json
            PROOF/sbom.json
            PROOF_E2E_REPORT.md
          if-no-files-found: error
          retention-days: 90

      - name: Attest build provenance
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          success()
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: 'PROOF/latest.json'

      - name: Attest diagram SVG provenance
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          success()
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: 'docs/diagrams/*.svg'

      - name: Install cosign
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          success()
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign PROOF/latest.json with cosign (keyless)
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          success()
        run: |
          cosign sign-blob --yes --bundle PROOF/latest.json.cosign.bundle PROOF/latest.json

      - name: Verify cosign signature (informational)
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          success()
        continue-on-error: true
        run: |
          cosign verify-blob \
            --certificate-identity-regexp 'https://github.com/Ghenghis/HermesProof' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --bundle PROOF/latest.json.cosign.bundle \
            PROOF/latest.json

      - name: Commit updated proof to main
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          success()
        run: |
          set -e
          git config user.name "hermes-truth-gate-bot"
          git config user.email "bot@hermes3d.local"
          if [ -n "$(git status --porcelain PROOF/latest.json PROOF/sbom.json PROOF_E2E_REPORT.md PROOF/latest.json.cosign.bundle)" ]; then
            git add PROOF/latest.json PROOF/sbom.json PROOF_E2E_REPORT.md PROOF/latest.json.cosign.bundle
            git commit -m "ci: refresh truth-gate proof for ${GITHUB_SHA::7} [skip ci]" \
                       -m "Run id: ${{ github.run_id }}" \
                       -m "Workflow: ${{ github.workflow }}"
            git push origin HEAD:main
            echo "PROOF refreshed."
          else
            echo "PROOF unchanged; nothing to commit."
          fi
