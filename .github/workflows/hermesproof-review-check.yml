name: HermesProof Review Check

on:
  pull_request:
    # Adding `edited` so PR body updates re-run the mechanical review
    # without requiring an empty commit. Adding workflow_dispatch so
    # it's possible to manually re-run when needed.
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  mechanical-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mechanical PR checklist
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const changed = files.map((file) => file.filename);
            const addedHandoffs = files.filter((file) =>
              file.status === 'added' && /^handoffs\/HANDOFF_.*\.md$/.test(file.filename)
            );
            const packageChanged = changed.includes('package.json');

            const checks = [];
            const add = (name, ok, detail) => checks.push({ name, ok, detail });

            add(
              'Evidence chain noted',
              /Hermes evidence chain:\s*PASS/i.test(body),
              'PR body must include "Hermes evidence chain: PASS".'
            );

            add(
              'Task id referenced',
              /\b(?:task[_ -]?id|task):\s*`?[A-Z0-9.-]+`?/i.test(body),
              'PR body must reference a task id matching ^[A-Z0-9.-]+$.'
            );

            add(
              'Gate run listed',
              /hermes_run_gate/i.test(body),
              'PR body must list at least one gate run via hermes_run_gate.'
            );

            add(
              'Changed files present',
              files.length > 0,
              `GitHub reports ${files.length} changed file(s).`
            );

            add(
              'Added handoff has reason and next actor',
              addedHandoffs.length === 0 || (/reason:/i.test(body) && /next actor:/i.test(body)),
              addedHandoffs.length === 0
                ? 'No added handoff files.'
                : 'Added handoff files require "reason:" and "next actor:" in the PR body.'
            );

            add(
              'PROOF latest exists',
              fs.existsSync('PROOF/latest.json'),
              'PROOF/latest.json must exist in this repo HEAD.'
            );

            let toolCountOk = true;
            let toolCountDetail = 'package.json version was not changed.';
            if (packageChanged) {
              const readme = fs.readFileSync('README.md', 'utf8');
              const readmeMatch = readme.match(/\b(\d+)\s+MCP tools\b/i);
              const readmeCount = readmeMatch ? Number(readmeMatch[1]) : NaN;
              const serverSource = fs.readFileSync('src/server.mjs', 'utf8');
              const serverCount = (serverSource.match(/registerTool\(\s*["']hermes_/g) || []).length;

              if (toolCountOk) {
                toolCountOk = readmeCount === serverCount;
                toolCountDetail = `README states ${readmeCount}; server registered ${serverCount}.`;
              }
            }

            add(
              'README tool count matches server when package version changes',
              toolCountOk,
              toolCountDetail
            );

            const failed = checks.filter((check) => !check.ok);
            const summary = [
              '## HermesProof mechanical review',
              '',
              ...checks.map((check) => `- ${check.ok ? 'PASS' : 'FAIL'}: ${check.name} - ${check.detail}`),
              '',
              failed.length === 0
                ? 'Result: PASS. This only proves the mechanical checklist; human review is still required.'
                : `Result: FAIL. ${failed.length} checklist item(s) need attention.`
            ].join('\n');

            const marker = '<!-- hermesproof-review-check -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body && comment.body.includes(marker)
            );
            const bodyWithMarker = `${marker}\n${summary}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: bodyWithMarker
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: bodyWithMarker
              });
            }

            if (failed.length > 0) {
              core.setFailed(`${failed.length} HermesProof mechanical review check(s) failed.`);
            }
