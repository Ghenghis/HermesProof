name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/diagrams/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r site/. _site/
          mkdir -p _site/diagrams
          cp docs/diagrams/*.svg _site/diagrams/
          touch _site/.nojekyll
          echo "--- _site contents ---"
          find _site -maxdepth 2 -type f | sort

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
