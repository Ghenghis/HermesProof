title = "HermesProof secret-scan rules"
extend.useDefault = true

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key (sk-ant-...)"
regex = '''sk-ant-[a-zA-Z0-9_-]{20,}'''
keywords = ["sk-ant-"]

[[rules]]
id = "deepseek-api-key"
description = "DeepSeek API key (requires deepseek keyword co-located within 120 chars)"
regex = '''(?i)deepseek[\s\S]{0,120}sk-[a-zA-Z0-9]{32,48}'''
keywords = ["deepseek"]

[[rules]]
id = "huggingface-token"
description = "Hugging Face token (hf_...)"
regex = '''hf_[a-zA-Z0-9]{30,}'''
keywords = ["hf_"]

[[rules]]
id = "siliconflow-api-key"
description = "SiliconFlow API key (requires siliconflow keyword co-located within 120 chars)"
regex = '''(?i)siliconflow[\s\S]{0,120}sk-[a-zA-Z0-9_-]{40,}'''
keywords = ["siliconflow"]

[[rules]]
id = "minimax-api-key"
description = "MiniMax API key"
regex = '''(?i)minimax[_-]?(api[_-]?)?key['"\s:=]+([a-zA-Z0-9_.-]{30,})'''
keywords = ["minimax"]

[[rules]]
id = "coderabbit-api-key"
description = "CodeRabbit API key (cr-...)"
regex = '''cr-[a-zA-Z0-9_-]{20,}'''
keywords = ["cr-", "coderabbit"]

[[rules]]
id = "github-personal-token"
description = "GitHub fine-grained or classic personal access token (ghp_...)"
regex = '''ghp_[a-zA-Z0-9]{30,}'''
keywords = ["ghp_"]

[[rules]]
id = "github-server-token"
description = "GitHub server-to-server token (ghs_...)"
regex = '''ghs_[a-zA-Z0-9]{30,}'''
keywords = ["ghs_"]

[[rules]]
id = "azure-speech-key"
description = "Azure Speech Service key (32-char hex within azure_speech context)"
regex = '''(?i)azure[_-]?speech[_-]?key['"\s:=]+[a-zA-Z0-9]{30,40}'''
keywords = ["azure_speech", "AZURE_SPEECH"]

[[rules]]
id = "minimax-cp-prefix"
description = "MiniMax cp-prefixed API key"
regex = '''cp-[a-zA-Z0-9]{30,}'''
keywords = ["cp-"]

[[allowlists]]
description = "Permitted patterns — synthetic test keys, examples"
regexes = [
  '''sk-ant-test-[a-zA-Z0-9-]+''',
  '''sk-ant-example-key''',
]
paths = [
  '''.*\.example$''',
  '''node_modules/.*''',
  '''handoffs/STREAM/backups/.*''',
]
