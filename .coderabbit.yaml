# CodeRabbit configuration for HermesProof.
#
# Schema reference: https://docs.coderabbit.ai/guides/configure-coderabbit
# Validate with: https://coderabbit.ai/yaml/schema (or run `coderabbit config validate`).
#
# Goals for HermesProof reviews:
#   1. Catch lock-discipline drift (the project's safety-critical surface).
#   2. Catch event-envelope drift (event_schema_version, atomic-rename invariants).
#   3. Recognize architect/implementer role boundaries (Claude = brain, Codex = hands).
#   4. Don't waste cycles re-reviewing PROOF/* (machine-generated) or node_modules.
#
# This file does NOT reference any API key. The CodeRabbit GitHub App auth is
# handled via the App installation; CLI usage reads CODERABBIT_API_KEY from
# the local environment (gitignored .env).

language: en-US
early_access: false
enable_free_tier: true

# How CodeRabbit phrases its reviews.
tone_instructions: >
  Be concise and rigorous: evidence-first, terse, no hype. Cite files/lines.
  Ask when uncertain. Explain tradeoffs. Prioritize lock, event, queue, proof,
  and path-rule invariants.

reviews:
  profile: chill           # less noisy than `assertive`; this repo is small + tidy
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - main

  # Skip machine-generated and bulk-vendored content.
  path_filters:
    - "!PROOF/**"               # auto-regenerated by truth-gates harness
    - "!PROOF_E2E_REPORT.md"    # auto-regenerated
    - "!PROOF_*_TEST.md"        # historical snapshots, not source
    - "!node_modules/**"
    - "!**/node_modules/**"
    - "!package-lock.json"      # noisy; npm install side-effects
    - "!coverage/**"
    - "!dist/**"
    - "!.hermes3d_orchestrator/**"  # runtime state, not source
    - "!**/__pycache__/**"

  # Per-path review focus. CodeRabbit applies these as additional context when
  # reviewing matching files.
  path_instructions:
    - path: "src/server.mjs"
      instructions: >
        This is the MCP tool registry. Verify every new tool is registered via
        `server.registerTool` (not legacy `server.tool`) with explicit MCP
        2025-11-25 annotations: readOnlyHint, destructiveHint, idempotentHint,
        openWorldHint, title. Owner regex must remain
        ^[a-z][a-z0-9-]{1,63}$. Tool descriptions MUST NOT contain
        prompt-injection markers (the truth-gate
        server.tool_description_hygiene rejects: "ignore previous", "you must",
        long base64, zero-width chars, executable HTML tags).

    - path: "src/core/event-manager.mjs"
      instructions: >
        Five v0.4 architect invariants must hold:
        (1) event-manager bookkeeping evidence carries data.system="event-manager"
            and the lock-manager skips re-emit on those rows (prevents infinite loop).
        (2) every outbox/handled/failed transition uses fs.rename (atomic).
        (3) only events/handled/ is auto-pruned; events/failed/ never is.
        (4) every event envelope has event_schema_version: 1; unknown versions
            move to events/failed/ with error: "unknown_schema_version".
        (5) evidence_ids are resolved at emit time (not handle time), ordered
            by chain.
        v0.4.1 perf pass introduces stream-based readline for evidenceIdsForTask
        and filename-sort-then-lazy-read for listEvents — flag any regression.

    - path: "src/core/lock-manager.mjs"
      instructions: >
        Lock acquisition uses mkdir(EEXIST) on a content-hashed dir — atomic.
        Path normalization via normalizeWorkspacePath rejects: "..",
        absolute paths escaping workspace, control chars, "~", NTFS Alternate
        Data Streams (":"). Never weaken these checks. Heartbeat extends TTL;
        only the owner can release; only stale recovery via
        hermes_recover_stale_locks can override another owner.

    - path: "src/core/fs-utils.mjs"
      instructions: >
        appendChainedJsonLine writes hash-chained NDJSON; verifyChainedLog
        walks prev_hash/entry_hash. canonicalJSON must produce stable bytes
        (sorted keys, no whitespace) — any change to it would break the chain
        across versions.

    - path: "scripts/truth-gates.mjs"
      instructions: >
        14 gates today: source.integrity_manifest, deps.parity, tests.unit,
        server.stdio_handshake (expects 20 tools), doctor.hermes3d,
        e2e.multi_agent_flow, workspace.integrity, clients.config_presence,
        clients.claude_code_live, server.tool_description_hygiene,
        evidence.hash_chain_valid, docs.master_prompt_deliverables_present,
        events.directory_present, trigger.doctor_passes. Adding a gate is
        fine; weakening a gate is not. Don't downgrade a "required" gate to
        "warn" without architect approval (PR description must reference an
        ADR or roadmap entry).

    - path: "scripts/watch-events.mjs"
      instructions: >
        Three modes: A console (default), B file packet
        (--write-review-packets), C webhook (HERMESPROOF_WEBHOOK_URL).
        Webhook fetch must use AbortController with a default 10s timeout
        (HERMESPROOF_WEBHOOK_TIMEOUT_MS overrides). Failed webhooks must
        leave the event in outbox/ for retry, never lose events.

    - path: ".github/workflows/**.yml"
      instructions: >
        Every action MUST be SHA-pinned (40-char commit hash with a trailing
        version comment). step-security/harden-runner audit must be the FIRST
        step of every job. Top-level permissions default to contents:read;
        write scopes are job-scoped only. The hermesproof-review-check
        workflow runs LLM-free mechanical checks; do not import any LLM SDK
        or call an external AI API from it.

    - path: "handoffs/**.md"
      instructions: >
        Handoff files are architect contracts. They must include: branch,
        exact file lock list, gates to run, done criteria, failure protocol,
        hard rules. The mechanical-review GitHub Action requires "reason:" and
        "next actor:" lines in the PR body whenever a handoff file is added.

    - path: "docs/**.md"
      instructions: >
        Treat numeric claims (tool count, gate count, MCP spec version) as
        load-bearing. They MUST stay consistent across README.md,
        TOOL_REFERENCE.md, ARCHITECTURE.md, MAINTENANCE.md, and the SVG
        text in docs/diagrams/*.svg. If a PR changes any count, verify it's
        updated everywhere or call it out as a follow-up.

    - path: "docs/diagrams/*.svg"
      instructions: >
        Self-contained: no <script>, no remote href, no @font-face URLs.
        Required scaffold: role="img", <title> with id, <desc> with id,
        aria-labelledby="<title-id> <desc-id>", and a
        prefers-reduced-motion media query as the first child of <defs>.
        SMIL animation only (no CSS animation). Each file under 100 KiB target.

    - path: "examples/**"
      instructions: >
        Client integration bundles. Configuration only — no source code.
        Every owner-string example must match ^[a-z][a-z0-9-]{1,63}$.
        References to MCP tools must use the actual tool names (no "lock"
        when the tool is "hermes_lock_files").

  finishing_touches:
    docstrings:
      enabled: false   # repo style is terse; auto-docstrings would conflict

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  pull_requests:
    scope: auto
  issues:
    scope: auto

# CodeRabbit ignores this if its API doesn't support it; harmless.
labels:
  added:
    - coderabbit-reviewed
